<?xml version="1.0" encoding="UTF-8"?>
<!--
  どうベビ アイコンスプライト — Lucide Icons ベースのアウトラインスタイル
  viewBox="0 0 24 24" / fill="none" / stroke="currentColor" stroke-width="2"
  stroke-linecap="round" stroke-linejoin="round
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ── ナビゲーション（タブバー） ─────────────────────────────────── -->

  <!-- ホーム -->
  <symbol id="icon-home" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </symbol>

  <!-- ニュース（新聞） -->
  <symbol id="icon-newspaper" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 3h13l3 3v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
    <polyline points="17 3 17 9 11 9"/>
    <line x1="7" y1="13" x2="16" y2="13"/>
    <line x1="7" y1="17" x2="13" y2="17"/>
  </symbol>

  <!-- 肉球（赤ちゃんタブ / ブランドロゴ兼用） -->
  <symbol id="icon-paw" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="4"  r="2"/>
    <circle cx="18" cy="8"  r="2"/>
    <circle cx="20" cy="16" r="2"/>
    <circle cx="4"  cy="8"  r="2"/>
    <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.05
             Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>
  </symbol>

  <!-- ランドマーク（動物園タブ） -->
  <symbol id="icon-landmark" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <line x1="3"  y1="22" x2="21" y2="22"/>
    <line x1="6"  y1="18" x2="6"  y2="22"/>
    <line x1="10" y1="18" x2="10" y2="22"/>
    <line x1="14" y1="18" x2="14" y2="22"/>
    <line x1="18" y1="18" x2="18" y2="22"/>
    <line x1="4"  y1="11" x2="20" y2="11"/>
    <polygon points="12 2 2 7 22 7"/>
  </symbol>

  <!-- カレンダー -->
  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
    <line x1="16" y1="2"  x2="16" y2="6"/>
    <line x1="8"  y1="2"  x2="8"  y2="6"/>
    <line x1="3"  y1="10" x2="21" y2="10"/>
  </symbol>

  <!-- ── ヘッダーボタン ───────────────────────────────────────────── -->

  <!-- ハート（お気に入り） -->
  <symbol id="icon-heart" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3
             c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5
             c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
  </symbol>

  <!-- 虫眼鏡（検索） -->
  <symbol id="icon-search" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </symbol>

  <!-- ベル（お知らせ） -->
  <symbol id="icon-bell" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
    <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
  </symbol>

  <!-- ── セクション見出しアイコン ────────────────────────────────── -->

  <!-- ケーキ（誕生日） -->
  <symbol id="icon-cake" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/>
    <path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/>
    <line x1="2" y1="21" x2="22" y2="21"/>
    <line x1="7"  y1="8" x2="7"  y2="11"/>
    <line x1="12" y1="8" x2="12" y2="11"/>
    <line x1="17" y1="8" x2="17" y2="11"/>
    <circle cx="7"  cy="7" r="1" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="7" r="1" fill="currentColor" stroke="none"/>
    <circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- メモ（説明文） -->
  <symbol id="icon-pencil" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20h9"/>
    <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
  </symbol>

  <!-- インフォ（基本情報） -->
  <symbol id="icon-info" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="16" x2="12" y2="12"/>
    <line x1="12" y1="8"  x2="12.01" y2="8"/>
  </symbol>

  <!-- ── CTAボタン ─────────────────────────────────────────────── -->

  <!-- チケット -->
  <symbol id="icon-ticket" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2
             a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
    <line x1="9" y1="12" x2="15" y2="12" stroke-dasharray="2 2"/>
  </symbol>

  <!-- マップピン（公式サイト・アクセス） -->
  <symbol id="icon-map-pin" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0Z"/>
    <circle cx="12" cy="10" r="3"/>
  </symbol>

  <!-- ── ブランドロゴ（肉球＝icon-pawと同じ形・別IDで参照しやすく） -->
  <symbol id="icon-logo" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="4"  r="2"/>
    <circle cx="18" cy="8"  r="2"/>
    <circle cx="20" cy="16" r="2"/>
    <circle cx="4"  cy="8"  r="2"/>
    <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.05
             Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>
  </symbol>

</svg>
